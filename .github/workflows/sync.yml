name: Sync schedules
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/generate.js
        env:
          EXPORT_URL: ${{ secrets.EXPORT_URL }}
      - run: |
          git config user.name "schedule-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "Update schedules" && git push)
